!
! FRRouting configuration file
!
log file /var/log/frr/frr.log
!
!  BGP CONFIGURATION
!
debug bgp keepalives
debug bgp updates in
debug bgp updates out
!
router bgp 10
  !announce my local network
  network 10.0.101.0/24

  !register neighboring ASes
  neighbor 10.0.12.2 remote-as 20
  neighbor 10.0.13.3 remote-as 30


  !automatically allows all incoming and outgoing prefix advertisements
  no bgp ebgp-requires-policy



  !TODO: Enforce egress and ingress TE
  
  
  !EGRESS
  neighbor 10.0.12.2 default-local-preference 250
  neighbor 10.0.13.3 default-local-preference 0



  !INGRESS
  !whenever AS10 sends out a BGP-Update we make sure that the updates via the bad link 
  !have a really small weight compared to updates via the link between AS10 and AS20
  
  route-map INGRESS_AS20 permit 10 
  set weight 400

  route-map INGRESS_AS30 permit 10 
  set weight 0

neighbor 10.0.12.2 INGRESS_AS20 out
neighbor 10.0.13.3 INGRESS_AS30 out
!
