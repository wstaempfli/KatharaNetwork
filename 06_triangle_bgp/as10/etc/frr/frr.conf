!
! FRRouting configuration file
!
log file /var/log/frr/frr.log
!
!  BGP CONFIGURATION
!
debug bgp keepalives
debug bgp updates in
debug bgp updates out
!
router bgp 10
  ! announce my local network
  network 10.0.101.0/24

  ! register neighboring ASes
  neighbor 10.0.12.2 remote-as 20
  neighbor 10.0.13.3 remote-as 30

  neighbor 10.0.12.2 map-route EGRESS_AS20 in
  neighbor 10.0.13.3 map-route EGRESS_AS30 in

  ! automatically allows all incoming and outgoing prefix advertisements
  no bgp ebgp-requires-policy



  ! TODO: Enforce egress and ingress TE

 ! list of prefixes that must be reached via AS20 
  ip prefix-list OUT_VIA_AS20 seq 10 permit 10.0.13.0/24
  ip prefix-list OUT_VIA_AS20 seq 20 permit 10.0.12.0/24

  route-map EGRESS_AS20 permit 10 
  match ip address prefix-list OUT_VIA_AS20
  set weight 400
  route-map EGRESS_AS20 permit 20
  ! else do nothing 

 ! decrease modify incoming BGP-UPDATES coming via AS30 (bad link) by changing weight
  route-map EGRESS_AS30 permit 10 
  match ip address prefix-list OUT_VIA_AS20
  set weight 0
  route-map EGRESS_AS30 permit 20
  ! else do nothing 


!
