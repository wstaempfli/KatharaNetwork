!
! FRRouting configuration file
!
log file /var/log/frr/frr.log
!
!  BGP CONFIGURATION
!
debug bgp keepalives
debug bgp updates in
debug bgp updates out
!
router bgp 300
  ! register t1att AS as provider
  ! and assign in-/egress route-maps (FRR "functions").
  neighbor 10.0.3.1 remote-as 10
  neighbor 10.0.3.1 route-map TODO_ROUTEMAP  in
  neighbor 10.0.3.1 route-map TODO_ROUTEMAP out

  ! register t3eth AS as customer,
  ! and assign in-/egress route-maps (FRR "functions").
  neighbor 10.0.8.2 remote-as 3000
  neighbor 10.0.8.2 route-map TODO_ROUTEMAP  in
  neighbor 10.0.8.2 route-map TODO_ROUTEMAP out

  ! register t3zkb AS as customer,
  ! and assign in-/egress route-maps (FRR "functions").
  neighbor 10.0.9.2 remote-as 4000
  neighbor 10.0.9.2 route-map TODO_ROUTEMAP  in
  neighbor 10.0.9.2 route-map TODO_ROUTEMAP out
!

